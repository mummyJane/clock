<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clock Bedside</title>
  <link rel="stylesheet" href="/bedside.css">
</head>
<body>
  <main id="bedsideShell" class="bedside-shell">
    <section id="mediaStage" class="media-stage is-hidden" aria-live="polite"></section>
    <div id="bedsideModules" class="bedside-modules" aria-live="polite"></div>
    <div id="mediaControls" class="media-controls is-hidden">
      <button id="mediaPlay" class="control-button" type="button">Play</button>
      <button id="mediaPause" class="control-button" type="button">Pause</button>
      <button id="mediaStop" class="control-button" type="button">Stop</button>
      <label class="volume-control" for="mediaVolume">
        <span>Volume</span>
        <input id="mediaVolume" type="range" min="0" max="300" step="1" value="200">
      </label>
      <button id="mediaClear" class="control-button control-button-soft" type="button">Clear</button>
    </div>
  </main>
  <script src="/bedside.js"></script>
</body>
</html>
